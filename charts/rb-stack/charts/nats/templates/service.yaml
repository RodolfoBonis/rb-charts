{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nats.serviceName" . }}
  namespace: {{ include "nats.namespace" . }}
  labels:
    {{- include "nats.labels" . | nindent 4 }}
  {{- if .Values.internalAccess.enabled }}
  annotations:
    dns.pfsense.org/enabled: "true"
    dns.pfsense.org/hostname: {{ .Values.internalAccess.hostname | quote }}
  {{- end }}
spec:
  {{- if .Values.internalAccess.enabled }}
  type: LoadBalancer
  {{- else }}
  type: ClusterIP
  {{- end }}
  ports:
    - port: {{ .Values.clientPort }}
      targetPort: client
      protocol: TCP
      name: client
    - port: {{ .Values.monitorPort }}
      targetPort: monitor
      protocol: TCP
      name: monitor
  selector:
    {{- include "nats.selectorLabels" . | nindent 4 }}
{{- end }}
