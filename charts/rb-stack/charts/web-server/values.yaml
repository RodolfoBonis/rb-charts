# Web server subchart defaults
# These values are typically overridden by the parent chart

enabled: false

# When true, the pod mounts the rb-stack app secret (<app>-secret) via envFrom.
# Set false for apps that supply their own secrets through `envFrom`.
useAppSecret: true

# Suffix for deployment/service names (e.g., "web" -> app-web, "api" -> app-api, "" -> app)
suffix: web

replicas: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

port: 3000

# Cloudflare exposure
expose: false
host: ""

resources:
  requests:
    memory: "128Mi"
    # CPU request = piso de scheduling / peso CFS (NÃO é teto — teto é limits). Medição real
    # no cluster mostrou web-servers usando 1-5m com request de 100m; 20m casa com a realidade
    # e libera budget do nó. Apps com carga real de CPU sobrescrevem no próprio values.
    cpu: "20m"
  limits:
    memory: "256Mi"

probes:
  readiness:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 5
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
  startup:
    enabled: false
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 30

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

monitoring:
  enabled: false
  path: /metrics
  port: 3000

ingress:
  className: traefik
  annotations: {}
  tls:
    enabled: true
    issuer: letsencrypt-issuer

# ConfigMap data (key-value pairs for environment variables)
configMap: {}

# Environment variables from ConfigMap
env: []

# Environment variables from Secret
envFrom: []

# Additional volume mounts
volumeMounts: []

# Additional volumes
volumes: []

# Pod affinity/anti-affinity rules
affinity: {}
