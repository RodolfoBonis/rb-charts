{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "redis.deploymentName" . }}
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
  {{- if ((.Values.global).reloader).enabled | default true }}
  annotations:
    reloader.stakater.com/auto: "true"
  {{- end }}
spec:
  replicas: 1
  revisionHistoryLimit: 2
  {{- if .Values.persistence.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "redis.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "redis.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      {{- with ((.Values.global).imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
              name: redis
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.persistence.enabled .Values.auth.enabled .Values.maxmemory .Values.tls.enabled }}
          command:
            - redis-server
            {{- if .Values.tls.enabled }}
            # Serve TLS only: disable the plaintext port and listen with TLS on
            # the same port number. Clients verify the server via ca.crt.
            - --tls-port
            - {{ .Values.port | quote }}
            - --port
            - "0"
            - --tls-cert-file
            - /etc/redis-certs/tls.crt
            - --tls-key-file
            - /etc/redis-certs/tls.key
            - --tls-ca-cert-file
            - /etc/redis-certs/ca.crt
            - --tls-auth-clients
            - {{ .Values.tls.authClients | default "no" | quote }}
            {{- end }}
            {{- if .Values.auth.enabled }}
            - --requirepass
            - $(REDIS_PASSWORD)
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - --appendonly
            - "yes"
            - --dir
            - /data
            {{- end }}
            {{- if .Values.maxmemory }}
            - --maxmemory
            - {{ .Values.maxmemory | quote }}
            {{- if .Values.maxmemoryPolicy }}
            - --maxmemory-policy
            - {{ .Values.maxmemoryPolicy | quote }}
            {{- end }}
            {{- end }}
          {{- end }}
          {{- if .Values.auth.enabled }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "redis.auth.existingSecret is required when redis.auth.enabled" .Values.auth.existingSecret }}
                  key: {{ .Values.auth.existingSecretKey | default "REDIS_PASSWORD" }}
            # redis-cli (probes) authenticates automatically via REDISCLI_AUTH
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.existingSecretKey | default "REDIS_PASSWORD" }}
          {{- end }}
          readinessProbe:
            exec:
              command:
                - redis-cli
                {{- if .Values.tls.enabled }}
                # Localhost health check: --insecure skips hostname/cert
                # verification (the cert SANs are the Service name, not
                # 127.0.0.1). REDISCLI_AUTH handles the password when auth is on.
                - --tls
                - --insecure
                {{- end }}
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                {{- if .Values.tls.enabled }}
                - --tls
                - --insecure
                {{- end }}
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: redis-certs
              mountPath: /etc/redis-certs
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "redis.pvcName" . }}
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: redis-certs
          secret:
            secretName: {{ required "redis.tls.existingSecret is required when redis.tls.enabled" .Values.tls.existingSecret }}
            # 0440 so the redis process (runAsUser 999, in the fsGroup) can read
            # tls.key via group; 0400 would deny group read and break startup.
            defaultMode: 0440
        {{- end }}
        - name: tmp
          emptyDir: {}
{{- end }}
