# Redis subchart defaults
# These values are typically overridden by the parent chart

enabled: false

image:
  repository: redis
  tag: "7-alpine"
  pullPolicy: IfNotPresent

port: 6379

storage: 1Gi
storageClassName: ""

persistence:
  enabled: false

# Memory cap + eviction. Empty = redis default (no limit, noeviction -> risks OOMKill
# at the container memory limit). For caches set e.g. maxmemory "100mb" + an LRU policy
# so redis evicts instead of being killed. maxmemoryPolicy is only applied when maxmemory
# is set.
maxmemory: ""              # e.g. "100mb"
maxmemoryPolicy: ""        # e.g. "allkeys-lru", "volatile-lru", "noeviction"

resources:
  requests:
    memory: "64Mi"
    # CPU request enxuto (uso real ~1m); teto real é o limits. Libera budget de scheduling.
    cpu: "10m"
  limits:
    memory: "128Mi"

# Internal network access via pfSense DNS
internalAccess:
  enabled: false
  hostname: ""  # e.g., myapp-redis.rb.lab

# Optional password auth (requirepass). Off by default so apps stay passwordless.
# When enabled, the server starts with --requirepass and reads the password from an
# existing secret key; redis-cli probes auth via REDISCLI_AUTH automatically.
auth:
  enabled: false
  existingSecret: ""              # secret holding the password (e.g. {app}-secret)
  existingSecretKey: REDIS_PASSWORD

# Optional TLS. Off by default so apps stay plaintext unless they opt in.
# When enabled, the server serves TLS only (plaintext --port disabled) on the
# same port number, and clients must connect over TLS. The cert secret must
# contain tls.crt, tls.key and ca.crt (e.g. a cert-manager Certificate whose
# SANs include the Service name). authClients "no" = server-side TLS only
# (clients verify the server via ca.crt); "yes" = require client certs (mTLS).
# Consuming apps must set their Redis client to TLS-on and point REDIS_TLS_CA at
# the same ca.crt.
tls:
  enabled: false
  existingSecret: ""              # secret with tls.crt/tls.key/ca.crt (e.g. {app}-redis-{env}-tls)
  authClients: "no"               # "no" = server TLS only; "yes" = require client certs (mTLS)
  # When issuer is set, the chart creates a cert-manager Certificate (secretName =
  # existingSecret) with SANs derived from the Service name. Leave empty to bring
  # your own secret.
  issuer: ""                      # cert-manager (Cluster)Issuer name, e.g. rb-lab-ca-issuer
  issuerKind: ClusterIssuer       # or "Issuer"
  duration: "2160h"
  renewBefore: "360h"
