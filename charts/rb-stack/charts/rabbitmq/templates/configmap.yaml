{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rabbitmq.configName" . }}
  namespace: {{ include "rabbitmq.namespace" . }}
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
data:
  enabled_plugins: |
    [{{ join "," .Values.plugins }}].
  rabbitmq.conf: |
    listeners.tcp.default = {{ .Values.ports.amqp }}
    management.tcp.port = {{ .Values.ports.management }}
    prometheus.tcp.port = {{ .Values.ports.metrics }}
    prometheus.return_per_object_metrics = true
    # guest stays loopback-only; real access is the Vault-managed admin user
    loopback_users.guest = true
    {{- with .Values.extraConfig }}
    {{ . | nindent 4 }}
    {{- end }}
{{- end }}
