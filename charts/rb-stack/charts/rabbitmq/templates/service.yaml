{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rabbitmq.serviceName" . }}
  namespace: {{ include "rabbitmq.namespace" . }}
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
  {{- if .Values.internalAccess.enabled }}
  annotations:
    dns.pfsense.org/enabled: "true"
    dns.pfsense.org/hostname: {{ .Values.internalAccess.hostname | quote }}
  {{- end }}
spec:
  {{- if .Values.internalAccess.enabled }}
  type: LoadBalancer
  {{- else }}
  type: ClusterIP
  {{- end }}
  ports:
    - { name: amqp, port: {{ .Values.ports.amqp }}, targetPort: amqp, protocol: TCP }
    - { name: management, port: {{ .Values.ports.management }}, targetPort: management, protocol: TCP }
    - { name: metrics, port: {{ .Values.ports.metrics }}, targetPort: metrics, protocol: TCP }
  selector:
    {{- include "rabbitmq.selectorLabels" . | nindent 4 }}
---
# Headless service for the StatefulSet stable network identity
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rabbitmq.headlessName" . }}
  namespace: {{ include "rabbitmq.namespace" . }}
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - { name: amqp, port: {{ .Values.ports.amqp }}, targetPort: amqp, protocol: TCP }
  selector:
    {{- include "rabbitmq.selectorLabels" . | nindent 4 }}
{{- end }}
