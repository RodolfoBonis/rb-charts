# RabbitMQ subchart defaults. Overridden by the parent chart.
enabled: false

image:
  repository: rabbitmq
  tag: "4-management"
  pullPolicy: IfNotPresent

ports:
  amqp: 5672
  amqps: 5671
  management: 15672
  metrics: 15692

# AMQPS (TLS) for AMQP — so OAuth tokens used as the AMQP password aren't sent in cleartext.
# When enabled with an issuer, the chart provisions a cert-manager Certificate (LAN host + in-cluster
# service DNS) and configures ssl_options + the 5671 listener. Plaintext 5672 stays up for legacy
# basic-auth clients until they migrate.
tls:
  enabled: false
  issuer: ""                 # ClusterIssuer name, e.g. internal-ca-issuer
  issuerKind: ClusterIssuer  # or Issuer
  secretName: ""             # default {name}-rabbitmq-amqps-tls
  dnsNames: []               # extra SANs beyond the LAN host + service DNS
  # Disable the plaintext AMQP listener (5672) entirely — AMQPS-only. Requires enabled: true.
  disablePlaintext: false

storage: 5Gi
storageClassName: ""
persistence:
  enabled: true

resources:
  requests:
    memory: "256Mi"
    # Broker real: mantém um pouco mais de request que os stateless (uso medido ~68m em pico),
    # mas 40m (não 100m) já garante prioridade de scheduling sem reservar ociosidade.
    cpu: "40m"
  limits:
    memory: "1Gi"

# Admin user/password from an existing secret (e.g. the app secret {name}-secret that the parent
# materializes from Vault). The official image creates this user on first boot.
auth:
  existingSecret: ""
  userKey: RABBITMQ_DEFAULT_USER
  passwordKey: RABBITMQ_DEFAULT_PASS
  # Optional: pin the Erlang cookie from a secret (needed only when clustering > 1 node).
  erlangCookieSecret: ""
  erlangCookieKey: RABBITMQ_ERLANG_COOKIE

# Plugins enabled via /etc/rabbitmq/enabled_plugins
plugins:
  - rabbitmq_management
  - rabbitmq_prometheus

# Extra lines appended to rabbitmq.conf
extraConfig: ""

# LoadBalancer (MetalLB) + pfSense DNS for reaching AMQP from the LAN
internalAccess:
  enabled: false
  hostname: ""   # e.g. rabbitmq.rb.lab

# Ingress for the management UI (Cloudflare-exposed)
ingress:
  enabled: false
  host: ""                      # e.g. rabbitmq.rodolfodebonis.com.br
  clusterIssuer: letsencrypt-issuer
  tlsSecretName: ""             # defaults to {name}-rabbitmq-tls

monitoring:
  serviceMonitor:
    enabled: false
    interval: 30s
