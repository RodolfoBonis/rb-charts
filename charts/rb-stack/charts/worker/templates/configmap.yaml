{{- if and .Values.enabled .Values.configMap }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "worker.appName" . }}-worker-config
  namespace: {{ include "worker.namespace" . }}
  labels:
    {{- include "worker.labels" . | nindent 4 }}
data:
  {{- range $k, $v := .Values.configMap }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
