{{- if .Values.vault.basePath }}
{{- if .Values.rabbitmq.enabled }}
{{- if dig "externalSecret" "enabled" true .Values.rabbitmq }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "rb-stack.rabbitmqSecretName" . }}
  namespace: {{ include "rb-stack.namespace" . }}
  labels:
    {{- include "rb-stack.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.vault.refreshInterval | default "30s" }}
  secretStoreRef:
    name: {{ include "rb-stack.secretStoreName" . }}
    kind: SecretStore
  target:
    name: {{ include "rb-stack.rabbitmqSecretName" . }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.vault.basePath }}/{{ .Values.environment }}/rabbitmq
{{- end }}
{{- end }}
{{- end }}
